<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Forte - Futuro Sustentável</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌱 Agro Forte, Futuro Sustentável</h1>
    <p>Calculadora de Consumo de Água na Agricultura</p>
</header>

<div class="container">

    <h2>Calcule o consumo de água da sua plantação</h2>

    <label>Área Plantada (hectares)</label>
    <input type="number" id="area" placeholder="Ex: 10">

    <label>Consumo médio de água por hectare (litros/dia)</label>
    <input type="number" id="consumo" placeholder="Ex: 5000">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>

</div>

<footer>
    <p>Projeto Agrinho 2026 | Tecnologia a favor do campo e do meio ambiente 🌎</p>
</footer>

<script src="script.js"></script>
</body>
</html>
